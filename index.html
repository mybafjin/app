<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ボクシングゲーム</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

#game{
margin:auto;
width:900px;
height:420px;
border:4px solid white;
background:linear-gradient(#555,#222);
}

.health{
width:400px;
height:20px;
background:#333;
border:2px solid white;
margin:auto;
}

.bar{
height:100%;
background:lime;
}

#result{
font-size:30px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>🥊 ボクシングゲーム</h1>

<div>赤（未来風）</div>
<div class="health"><div id="hp1" class="bar"></div></div>

<div>青（夫人風）</div>
<div class="health"><div id="hp2" class="bar"></div></div>

<canvas id="game" width="900" height="420"></canvas>

<div id="result"></div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const gravity=0.7

const p1={
x:200,
y:0,
vx:0,
vy:0,
hp:100,
combo:0,
attack:false,
dir:1,
name:"未来風",
color:"red"
}

const p2={
x:700,
y:0,
vx:0,
vy:0,
hp:100,
combo:0,
attack:false,
dir:-1,
name:"夫人風",
color:"blue"
}

const hp1=document.getElementById("hp1")
const hp2=document.getElementById("hp2")
const result=document.getElementById("result")

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function drawFighter(p){

let baseY=350-p.y

ctx.lineWidth=5
ctx.strokeStyle="white"

// torso
ctx.beginPath()
ctx.moveTo(p.x,baseY-90)
ctx.lineTo(p.x,baseY-40)
ctx.stroke()

// legs
ctx.beginPath()
ctx.moveTo(p.x,baseY-40)
ctx.lineTo(p.x-20,baseY)
ctx.moveTo(p.x,baseY-40)
ctx.lineTo(p.x+20,baseY)
ctx.stroke()

// arms
ctx.beginPath()

if(p.attack){

ctx.moveTo(p.x,baseY-80)
ctx.lineTo(p.x+45*p.dir,baseY-80)

}else{

ctx.moveTo(p.x,baseY-80)
ctx.lineTo(p.x+20*p.dir,baseY-60)

}

ctx.moveTo(p.x,baseY-80)
ctx.lineTo(p.x-20*p.dir,baseY-60)

ctx.stroke()

// head
ctx.beginPath()
ctx.arc(p.x,baseY-110,18,0,Math.PI*2)
ctx.fillStyle=p.color
ctx.fill()

ctx.fillStyle="white"
ctx.font="10px sans-serif"
ctx.fillText(p.name,p.x-18,baseY-110)

}

function physics(p){

p.x+=p.vx
p.y+=p.vy

p.vy-=gravity

p.vx*=0.9

if(p.y<0){
p.y=0
p.vy=0
}

if(p.x<20)p.x=20
if(p.x>880)p.x=880

}

function punch(attacker,target){

if(attacker.attack) return

attacker.attack=true

let dist=Math.abs(attacker.x-target.x)

if(dist<90){

attacker.combo++

let damage=8+attacker.combo*2
target.hp-=damage

// ノックバック
let force=8+attacker.combo*2
target.vx=force*attacker.dir
target.vy=4

}else{

attacker.combo=0

}

setTimeout(()=>{
attacker.attack=false
},180)

}

function control(){

// p1
if(keys["a"]){
p1.x-=5
p1.dir=-1
}
if(keys["d"]){
p1.x+=5
p1.dir=1
}
if(keys["w"] && p1.y===0)p1.vy=12
if(keys["f"])punch(p1,p2)

// p2
if(keys["ArrowLeft"]){
p2.x-=5
p2.dir=-1
}
if(keys["ArrowRight"]){
p2.x+=5
p2.dir=1
}
if(keys["ArrowUp"] && p2.y===0)p2.vy=12
if(keys["/"])punch(p2,p1)

}

function update(){

control()

physics(p1)
physics(p2)

ctx.clearRect(0,0,900,420)

drawFighter(p1)
drawFighter(p2)

hp1.style.width=p1.hp+"%"
hp2.style.width=p2.hp+"%"

if(p1.hp<=0){
result.textContent="青（夫人風）の勝ち！"
return
}

if(p2.hp<=0){
result.textContent="赤（未来風）の勝ち！"
return
}

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
