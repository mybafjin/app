<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ボクシングゲーム</title>
<style>
body{
    margin:0;
    background:#222;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

h1{
    margin:10px;
}

#game{
    position:relative;
    width:900px;
    height:400px;
    margin:auto;
    background:linear-gradient(#555,#333);
    border:4px solid white;
    overflow:hidden;
}

.player{
    position:absolute;
    width:50px;
    height:80px;
    bottom:0;
}

#p1{ background:red; }
#p2{ background:blue; }

.health{
    width:400px;
    height:20px;
    background:#444;
    margin:5px auto;
    border:2px solid white;
}

.bar{
    height:100%;
    background:lime;
}

#result{
    font-size:30px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>🥊 ボクシングゲーム</h1>

<div>Player1</div>
<div class="health"><div id="hp1" class="bar"></div></div>

<div>Player2</div>
<div class="health"><div id="hp2" class="bar"></div></div>

<div id="game">
<div id="p1" class="player"></div>
<div id="p2" class="player"></div>
</div>

<div id="result"></div>

<script>

const gameWidth = 900;

const p1 = {
    el:document.getElementById("p1"),
    x:100,
    y:0,
    vy:0,
    hp:100,
    attacking:false
};

const p2 = {
    el:document.getElementById("p2"),
    x:700,
    y:0,
    vy:0,
    hp:100,
    attacking:false
};

const hp1bar = document.getElementById("hp1");
const hp2bar = document.getElementById("hp2");
const result = document.getElementById("result");

let keys = {};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function update(){

    // Player1 movement
    if(keys["a"]) p1.x -=5;
    if(keys["d"]) p1.x +=5;

    if(keys["w"] && p1.y===0){
        p1.vy = 12;
    }

    if(keys["f"] && !p1.attacking){
        punch(p1,p2);
    }

    // Player2 movement
    if(keys["ArrowLeft"]) p2.x -=5;
    if(keys["ArrowRight"]) p2.x +=5;

    if(keys["ArrowUp"] && p2.y===0){
        p2.vy = 12;
    }

    if(keys["/"] && !p2.attacking){
        punch(p2,p1);
    }

    physics(p1);
    physics(p2);

    draw(p1);
    draw(p2);

    hp1bar.style.width = p1.hp + "%";
    hp2bar.style.width = p2.hp + "%";

    if(p1.hp<=0){
        result.textContent="Player2 勝利！";
        return;
    }

    if(p2.hp<=0){
        result.textContent="Player1 勝利！";
        return;
    }

    requestAnimationFrame(update);
}

function physics(p){
    p.y += p.vy;
    p.vy -=0.6;

    if(p.y <0){
        p.y =0;
        p.vy =0;
    }

    if(p.x<0) p.x=0;
    if(p.x>gameWidth-50) p.x=gameWidth-50;
}

function draw(p){
    p.el.style.left = p.x + "px";
    p.el.style.bottom = p.y + "px";
}

function punch(attacker,target){

    attacker.attacking = true;

    let dist = Math.abs(attacker.x - target.x);

    if(dist <80){
        target.hp -=10;
    }

    attacker.el.style.transform="scaleX(1.3)";

    setTimeout(()=>{
        attacker.el.style.transform="scaleX(1)";
        attacker.attacking=false;
    },200);
}

update();

</script>

</body>
</html>
