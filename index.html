<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Banana Rush</title>

<style>

body{
margin:0;
background:#87CEEB;
overflow:hidden;
font-family:sans-serif;
}

#game{
width:420px;
height:650px;
margin:auto;
position:relative;
overflow:hidden;
border:5px solid white;
background:linear-gradient(#6ec1ff,#bfe9ff);
perspective:500px;
}

#road{
position:absolute;
width:100%;
height:200%;
background:repeating-linear-gradient(
#444 0px,
#444 80px,
#555 80px,
#555 160px
);
transform:rotateX(60deg);
transform-origin:top;
}

.laneLine{
position:absolute;
width:4px;
height:100%;
background:white;
left:33%;
}

.laneLine2{
position:absolute;
width:4px;
height:100%;
background:white;
left:66%;
}

#player{
width:60px;
height:70px;
background:yellow;
border-radius:30px;
border:3px solid black;
position:absolute;
bottom:90px;
left:180px;
transition:left 0.2s;
}

.eye{
width:15px;
height:15px;
background:white;
border-radius:50%;
position:absolute;
top:20px;
}

.eye1{left:10px;}
.eye2{right:10px;}

.pupil{
width:8px;
height:8px;
background:black;
border-radius:50%;
margin:3px;
}

.jump{
animation:jump 0.7s;
}

@keyframes jump{
0%{bottom:90px}
50%{bottom:230px}
100%{bottom:90px}
}

.slide{
height:35px;
}

.banana{
width:30px;
height:18px;
background:gold;
border-radius:20px;
position:absolute;
top:-50px;
}

.airBanana{
width:30px;
height:18px;
background:orange;
border-radius:20px;
position:absolute;
top:-50px;
}

.barrier{
width:80px;
height:25px;
background:red;
position:absolute;
top:-60px;
}

#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:22px;
font-weight:bold;
}

#title{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="game">

<div id="road"></div>
<div class="laneLine"></div>
<div class="laneLine2"></div>

<div id="player">
<div class="eye eye1"><div class="pupil"></div></div>
<div class="eye eye2"><div class="pupil"></div></div>
</div>

<div id="score">Bananas:0</div>

<div id="title">
<h1>🍌 Banana Rush</h1>
<button onclick="startGame()">START</button>
</div>

</div>

<script>

const game=document.getElementById("game");
const player=document.getElementById("player");
const scoreText=document.getElementById("score");
const title=document.getElementById("title");

const lanes=[60,180,300];
let lane=1;

let bananas=[];
let airBananas=[];
let barriers=[];

let score=0;
let speed=4;
let roadY=0;

let jumping=false;
let sliding=false;
let running=false;

document.addEventListener("keydown",e=>{

if(!running)return;

if(e.key==="ArrowLeft" && lane>0){
lane--;
player.style.left=lanes[lane]+"px";
}

if(e.key==="ArrowRight" && lane<2){
lane++;
player.style.left=lanes[lane]+"px";
}

if(e.key==="ArrowUp" && !jumping){
jump();
}

if(e.key==="ArrowDown" && !sliding){
slide();
}

});

function jump(){
jumping=true;
player.classList.add("jump");

setTimeout(()=>{
player.classList.remove("jump");
jumping=false;
},700);
}

function slide(){
sliding=true;
player.classList.add("slide");

setTimeout(()=>{
player.classList.remove("slide");
sliding=false;
},700);
}

function createBanana(){

const b=document.createElement("div");
b.classList.add("banana");

let laneIndex=Math.floor(Math.random()*3);
b.style.left=lanes[laneIndex]+"px";

game.appendChild(b);
bananas.push(b);

}

function createAirBanana(){

const b=document.createElement("div");
b.classList.add("airBanana");

let laneIndex=Math.floor(Math.random()*3);
b.style.left=lanes[laneIndex]+"px";
b.style.top="-120px";

game.appendChild(b);
airBananas.push(b);

}

function createBarrier(){

const b=document.createElement("div");
b.classList.add("barrier");

let laneIndex=Math.floor(Math.random()*3);
b.style.left=(lanes[laneIndex]-10)+"px";

game.appendChild(b);
barriers.push(b);

}

function startGame(){

title.style.display="none";
running=true;

setInterval(createBanana,1200);
setInterval(createAirBanana,2000);
setInterval(createBarrier,2500);

gameLoop();

}

function gameLoop(){

if(!running)return;

speed+=0.001;

bananas.forEach((b,i)=>{

b.style.top=b.offsetTop+speed+"px";

if(checkCollision(player,b)){
score++;
b.remove();
bananas.splice(i,1);
}

if(b.offsetTop>650){
b.remove();
bananas.splice(i,1);
}

});

airBananas.forEach((b,i)=>{

b.style.top=b.offsetTop+speed+"px";

if(jumping && checkCollision(player,b)){
score+=2;
b.remove();
airBananas.splice(i,1);
}

if(b.offsetTop>650){
b.remove();
airBananas.splice(i,1);
}

});

barriers.forEach((b,i)=>{

b.style.top=b.offsetTop+speed+"px";

if(!sliding && checkCollision(player,b)){
gameOver();
}

if(b.offsetTop>650){
b.remove();
barriers.splice(i,1);
}

});

scoreText.textContent="Bananas:"+score;

requestAnimationFrame(gameLoop);

}

function checkCollision(a,b){

return !(
a.offsetTop + a.offsetHeight < b.offsetTop ||
a.offsetTop > b.offsetTop + b.offsetHeight ||
a.offsetLeft + a.offsetWidth < b.offsetLeft ||
a.offsetLeft > b.offsetLeft + b.offsetWidth
);

}

function gameOver(){

running=false;
title.innerHTML="<h1>Game Over</h1><p>Bananas:"+score+"</p><button onclick='location.reload()'>Restart</button>";
title.style.display="flex";

}

</script>

</body>
</html>
