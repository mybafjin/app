<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゴリラ vs パンダ ボクシング</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#87ceeb;
overflow:hidden;
}

canvas{
display:block;
margin:auto;
border:4px solid black;
background:linear-gradient(#87ceeb 70%, #4caf50 70%);
}

.panel{
position:absolute;
top:80px;
width:200px;
font-size:14px;
}

.left{left:10px}
.right{right:10px}

.health{
position:absolute;
top:10px;
width:300px;
height:20px;
background:#333;
border:2px solid black;
}

#hp1{left:220px}
#hp2{right:220px}

.bar{
height:100%;
background:red;
}

#result{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:50px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="result"></div>

<div class="health" id="hp1"><div class="bar" id="bar1"></div></div>
<div class="health" id="hp2"><div class="bar" id="bar2"></div></div>

<div class="panel left">
<b>🦍 ゴリラ</b><br>
A / D 移動<br>
W ジャンプ<br>
F ストレート<br>
G フック<br>
H アッパー
</div>

<div class="panel right">
<b>🐼 パンダ</b><br>
← → 移動<br>
↑ ジャンプ<br>
J ストレート<br>
K フック<br>
L アッパー
</div>

<canvas id="game" width="900" height="420"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const gravity=0.6

function player(x,type){
return{
x:x,
y:0,
vx:0,
vy:0,
hp:100,
attack:"",
combo:0,
rot:0,
dead:false,
type:type,
squash:1
}
}

const gorilla=player(200,"gorilla")
const panda=player(700,"panda")

const bar1=document.getElementById("bar1")
const bar2=document.getElementById("bar2")
const result=document.getElementById("result")

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function physics(p){

p.x+=p.vx
p.y+=p.vy

p.vy-=gravity
p.vx*=0.9

if(p.y<0){
p.y=0
p.vy=0
}

}

function drawGorilla(p){

let baseY=350-p.y

ctx.save()
ctx.translate(p.x,baseY)
ctx.rotate(p.rot)

let squash=1+Math.sin(Date.now()/120)/30

// body
ctx.fillStyle="#333"
ctx.beginPath()
ctx.ellipse(0,0,40*squash,55/squash,0,0,Math.PI*2)
ctx.fill()

// arms
ctx.fillStyle="#222"
ctx.beginPath()
ctx.ellipse(-45,-10,20,35,0,0,Math.PI*2)
ctx.ellipse(45,-10,20,35,0,0,Math.PI*2)
ctx.fill()

// legs
ctx.beginPath()
ctx.ellipse(-20,45,20,25,0,0,Math.PI*2)
ctx.ellipse(20,45,20,25,0,0,Math.PI*2)
ctx.fill()

// head
ctx.fillStyle="#444"
ctx.beginPath()
ctx.arc(0,-60,25,0,Math.PI*2)
ctx.fill()

// face
ctx.fillStyle="#aaa"
ctx.beginPath()
ctx.ellipse(0,-55,15,10,0,0,Math.PI*2)
ctx.fill()

// eyes
ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(-8,-60,3,0,Math.PI*2)
ctx.arc(8,-60,3,0,Math.PI*2)
ctx.fill()

ctx.restore()

}

function drawPanda(p){

let baseY=350-p.y

ctx.save()
ctx.translate(p.x,baseY)
ctx.rotate(p.rot)

let squash=1+Math.sin(Date.now()/120)/30

// body
ctx.fillStyle="white"
ctx.beginPath()
ctx.ellipse(0,0,40*squash,55/squash,0,0,Math.PI*2)
ctx.fill()

// arms
ctx.fillStyle="black"
ctx.beginPath()
ctx.ellipse(-45,-10,20,35,0,0,Math.PI*2)
ctx.ellipse(45,-10,20,35,0,0,Math.PI*2)
ctx.fill()

// legs
ctx.beginPath()
ctx.ellipse(-20,45,20,25,0,0,Math.PI*2)
ctx.ellipse(20,45,20,25,0,0,Math.PI*2)
ctx.fill()

// head
ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(0,-60,25,0,Math.PI*2)
ctx.fill()

// ears
ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(-18,-80,8,0,Math.PI*2)
ctx.arc(18,-80,8,0,Math.PI*2)
ctx.fill()

// eyes
ctx.beginPath()
ctx.arc(-10,-60,7,0,Math.PI*2)
ctx.arc(10,-60,7,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(-10,-60,3,0,Math.PI*2)
ctx.arc(10,-60,3,0,Math.PI*2)
ctx.fill()

ctx.restore()

}

function drawPlayer(p){

if(p.type==="gorilla") drawGorilla(p)
if(p.type==="panda") drawPanda(p)

}

function attack(a,t,type){

if(a.dead) return

a.attack=type

let dist=Math.abs(a.x-t.x)

if(dist<100){

a.combo++

let dmg=8
if(type==="hook") dmg=12
if(type==="upper") dmg=16

dmg+=a.combo*2

t.hp-=dmg

t.vx=(t.x>a.x?1:-1)*(6+a.combo*2)
t.vy=4

}else{
a.combo=0
}

setTimeout(()=>a.attack="",200)

}

function control(){

if(keys["a"]) gorilla.x-=4
if(keys["d"]) gorilla.x+=4
if(keys["w"] && gorilla.y===0) gorilla.vy=11

if(keys["f"]) attack(gorilla,panda,"straight")
if(keys["g"]) attack(gorilla,panda,"hook")
if(keys["h"]) attack(gorilla,panda,"upper")

if(keys["ArrowLeft"]) panda.x-=4
if(keys["ArrowRight"]) panda.x+=4
if(keys["ArrowUp"] && panda.y===0) panda.vy=11

if(keys["j"]) attack(panda,gorilla,"straight")
if(keys["k"]) attack(panda,gorilla,"hook")
if(keys["l"]) attack(panda,gorilla,"upper")

}

function koCheck(){

if(gorilla.hp<=0 && !gorilla.dead){
gorilla.dead=true
result.textContent="🐼 パンダ KO!"
fall(gorilla)
}

if(panda.hp<=0 && !panda.dead){
panda.dead=true
result.textContent="🦍 ゴリラ KO!"
fall(panda)
}

}

function fall(p){

let t=setInterval(()=>{

p.rot+=0.25
p.y-=2

if(p.y<-120) clearInterval(t)

},16)

}

function update(){

control()

physics(gorilla)
physics(panda)

ctx.clearRect(0,0,900,420)

drawPlayer(gorilla)
drawPlayer(panda)

bar1.style.width=gorilla.hp+"%"
bar2.style.width=panda.hp+"%"

koCheck()

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
