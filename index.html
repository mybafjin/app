<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>連打ハードルレース</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#87ceeb,#dff6ff);
text-align:center;
}

h1{
margin:10px;
}

#game{
width:1000px;
height:260px;
margin:auto;
background:#4CAF50;
border:5px solid #333;
position:relative;
overflow:hidden;
}

.track{
position:absolute;
bottom:60px;
width:100%;
height:6px;
background:white;
}

.runner{
position:absolute;
bottom:66px;
font-size:45px;
}

.leg{
position:absolute;
width:8px;
height:20px;
background:#333;
bottom:-15px;
}

.leg.left{
left:10px;
}

.leg.right{
left:25px;
}

.hurdle{
position:absolute;
bottom:60px;
width:12px;
height:40px;
background:white;
border:2px solid #444;
}

#finish{
position:absolute;
right:0;
height:100%;
width:10px;
background:red;
}

#controls{
position:absolute;
right:10px;
top:10px;
background:white;
padding:10px;
border-radius:10px;
font-size:14px;
text-align:left;
}

button{
margin-top:10px;
font-size:18px;
padding:10px 20px;
cursor:pointer;
}

#result{
font-size:28px;
}

</style>
</head>
<body>

<h1>連打ハードルレース</h1>

<div id="game">

<div class="track"></div>

<div id="runner1" class="runner">
🙂
<div class="leg left"></div>
<div class="leg right"></div>
</div>

<div id="runner2" class="runner" style="bottom:120px;">
😎
<div class="leg left"></div>
<div class="leg right"></div>
</div>

<div class="hurdle" style="left:350px"></div>
<div class="hurdle" style="left:600px"></div>
<div class="hurdle" style="left:800px"></div>

<div id="finish"></div>

<div id="controls">
<b>操作方法</b><br><br>
プレイヤー1<br>
A：走る<br>
W：ジャンプ<br><br>

プレイヤー2<br>
L：走る<br>
I：ジャンプ
</div>

</div>

<h2 id="result"></h2>

<button onclick="restart()">もう一度レース</button>

<script>

let pos1=0
let pos2=0

let speed1=0
let speed2=0

let y1=0
let y2=0

let vy1=0
let vy2=0

let finished=false

const gravity=0.6
const jumpPower=12
const finish=950

const hurdles=[350,600,800]

document.addEventListener("keydown",e=>{

if(finished)return

if(e.key==="a") speed1+=0.5
if(e.key==="l") speed2+=0.5

if(e.key==="w" && y1===0) vy1=jumpPower
if(e.key==="i" && y2===0) vy2=jumpPower

})

function animateLegs(){

let t=Date.now()/100

document.querySelector("#runner1 .left").style.transform=
`rotate(${Math.sin(t)*40}deg)`

document.querySelector("#runner1 .right").style.transform=
`rotate(${Math.sin(t+1)*40}deg)`

document.querySelector("#runner2 .left").style.transform=
`rotate(${Math.sin(t)*40}deg)`

document.querySelector("#runner2 .right").style.transform=
`rotate(${Math.sin(t+1)*40}deg)`

}

function checkHurdle(playerPos,playerY){

for(let h of hurdles){

if(
playerPos>h-20 &&
playerPos<h+10 &&
playerY<20
){
return true
}

}

return false

}

function update(){

if(finished)return

speed1*=0.95
speed2*=0.95

pos1+=speed1
pos2+=speed2

vy1-=gravity
vy2-=gravity

y1+=vy1
y2+=vy2

if(y1<0){y1=0;vy1=0}
if(y2<0){y2=0;vy2=0}

if(checkHurdle(pos1,y1)) speed1*=0.4
if(checkHurdle(pos2,y2)) speed2*=0.4

document.getElementById("runner1").style.left=pos1+"px"
document.getElementById("runner2").style.left=pos2+"px"

document.getElementById("runner1").style.bottom=(66+y1)+"px"
document.getElementById("runner2").style.bottom=(120+y2)+"px"

animateLegs()

if(pos1>=finish){
finished=true
document.getElementById("result").innerText="プレイヤー1 勝利！"
}

if(pos2>=finish){
finished=true
document.getElementById("result").innerText="プレイヤー2 勝利！"
}

}

setInterval(update,30)

function restart(){

pos1=0
pos2=0

speed1=0
speed2=0

y1=0
y2=0

vy1=0
vy2=0

finished=false

document.getElementById("runner1").style.left="0px"
document.getElementById("runner2").style.left="0px"

document.getElementById("result").innerText=""

}

</script>

</body>
</html>
