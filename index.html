```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Gorilla vs Panda Fighter</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#87ceeb;
}

canvas{
display:block;
margin:auto;
border:4px solid black;
background:linear-gradient(#87ceeb 65%, #4caf50 65%);
}

#ui{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-size:20px;
}

.health{
height:18px;
width:300px;
background:#333;
display:inline-block;
margin:5px;
border:2px solid black;
}

.bar{
height:100%;
background:red;
}

#result{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:60px;
font-weight:bold;
}

#restart{
position:absolute;
top:55%;
left:50%;
transform:translateX(-50%);
font-size:22px;
padding:10px 20px;
display:none;
}

</style>
</head>

<body>

<div id="ui">

<div class="health"><div id="hp1" class="bar"></div></div>
<div class="health"><div id="hp2" class="bar"></div></div>

<div id="timer">60</div>

</div>

<div id="result"></div>
<button id="restart">もう一度試合</button>

<canvas id="game" width="900" height="420"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

const gravity=0.7

function player(x,type){
return{
x:x,
y:0,
vx:0,
vy:0,
hp:100,
attack:"",
cool:0,
combo:0,
dead:false,
type:type,
walk:0
}
}

let gorilla,panda
let effects=[]
let time=60

function reset(){

gorilla=player(200,"gorilla")
panda=player(700,"panda")

time=60

document.getElementById("result").textContent=""
document.getElementById("restart").style.display="none"

}

reset()

document.getElementById("restart").onclick=reset

function physics(p){

p.x+=p.vx
p.y+=p.vy

p.vy-=gravity
p.vx*=0.9

if(p.y<0){
p.y=0
p.vy=0
}

}

function drawCloud(x,y){

ctx.fillStyle="white"

ctx.beginPath()
ctx.arc(x,y,20,0,Math.PI*2)
ctx.arc(x+20,y+5,25,0,Math.PI*2)
ctx.arc(x+40,y,20,0,Math.PI*2)
ctx.fill()

}

function drawStage(){

drawCloud(150,80)
drawCloud(600,70)
drawCloud(400,100)

}

function drawPlayer(p){

let baseY=350-p.y

ctx.save()
ctx.translate(p.x,baseY)

let walk=Math.sin(p.walk)*5

// body
ctx.fillStyle=(p.type==="gorilla")?"#444":"white"

ctx.beginPath()
ctx.ellipse(0,0,40,55,0,0,Math.PI*2)
ctx.fill()

// arms
ctx.fillStyle=(p.type==="gorilla")?"#222":"black"

let arm=0
if(p.attack==="straight") arm=45
if(p.attack==="hook") arm=30
if(p.attack==="upper") arm=15
if(p.attack==="special") arm=60

ctx.beginPath()
ctx.ellipse(-45-arm,-10,18,35,0,0,Math.PI*2)
ctx.ellipse(45+arm,-10,18,35,0,0,Math.PI*2)
ctx.fill()

// legs
ctx.beginPath()
ctx.ellipse(-20,45+walk,18,22,0,0,Math.PI*2)
ctx.ellipse(20,45-walk,18,22,0,0,Math.PI*2)
ctx.fill()

// head
ctx.fillStyle=(p.type==="gorilla")?"#555":"white"
ctx.beginPath()
ctx.arc(0,-60,25,0,Math.PI*2)
ctx.fill()

if(p.type==="panda"){

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(-18,-80,8,0,Math.PI*2)
ctx.arc(18,-80,8,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(-10,-60,7,0,Math.PI*2)
ctx.arc(10,-60,7,0,Math.PI*2)
ctx.fill()

}

ctx.restore()

}

function drawEffects(){

for(let i=effects.length-1;i>=0;i--){

let e=effects[i]

ctx.fillStyle="yellow"

ctx.beginPath()
ctx.arc(e.x,e.y,e.r,0,Math.PI*2)
ctx.fill()

e.r+=1
e.life--

if(e.life<=0) effects.splice(i,1)

}

}

function hit(a,t,dmg){

t.hp-=dmg

effects.push({
x:(a.x+t.x)/2,
y:300,
r:5,
life:10
})

t.vx=(t.x>a.x?1:-1)*8
t.vy=5

}

function attack(a,t,type){

if(a.cool>0||a.dead) return

a.attack=type

let dist=Math.abs(a.x-t.x)

if(dist<110){

if(type==="straight") hit(a,t,3)
if(type==="hook") hit(a,t,4)
if(type==="upper") hit(a,t,5)
if(type==="special") hit(a,t,8)

}

a.cool=25

if(type==="special") a.cool=80

setTimeout(()=>a.attack="",200)

}

function playerControl(){

if(keys["a"]){gorilla.x-=4;gorilla.walk+=0.3}
if(keys["d"]){gorilla.x+=4;gorilla.walk+=0.3}

if(keys["w"] && gorilla.y===0) gorilla.vy=12

if(keys["f"]) attack(gorilla,panda,"straight")
if(keys["g"]) attack(gorilla,panda,"hook")
if(keys["h"]) attack(gorilla,panda,"upper")
if(keys["b"]) attack(gorilla,panda,"special")

}

function cpu(){

if(panda.dead) return

let dx=gorilla.x-panda.x

if(Math.abs(dx)>80){

panda.x+=Math.sign(dx)*2
panda.walk+=0.2

}else{

if(Math.random()<0.02) attack(panda,gorilla,"straight")
if(Math.random()<0.02) attack(panda,gorilla,"hook")
if(Math.random()<0.01) attack(panda,gorilla,"upper")

}

}

function timerTick(){

time--

document.getElementById("timer").textContent=time

if(time<=0){

let winner=gorilla.hp>panda.hp?"🦍 Gorilla Wins":"🐼 Panda Wins"

document.getElementById("result").textContent=winner
document.getElementById("restart").style.display="block"

}

}

setInterval(timerTick,1000)

function update(){

playerControl()
cpu()

physics(gorilla)
physics(panda)

if(gorilla.cool>0) gorilla.cool--
if(panda.cool>0) panda.cool--

ctx.clearRect(0,0,900,420)

drawStage()

drawPlayer(gorilla)
drawPlayer(panda)

drawEffects()

document.getElementById("hp1").style.width=gorilla.hp+"%"
document.getElementById("hp2").style.width=panda.hp+"%"

if(gorilla.hp<=0){

document.getElementById("result").textContent="🐼 Panda KO!"
document.getElementById("restart").style.display="block"

}

if(panda.hp<=0){

document.getElementById("result").textContent="🦍 Gorilla KO!"
document.getElementById("restart").style.display="block"

}

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
```
