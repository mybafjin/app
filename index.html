<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ぷにぷにボクシング</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:linear-gradient(#666,#222);
border:4px solid white;
}

.health{
width:350px;
height:20px;
background:#333;
margin:auto;
border:2px solid white;
}

.bar{
height:100%;
background:lime;
}

#result{
font-size:40px;
margin-top:10px;
}

</style>
</head>

<body>

<h2>🥊 ぷにぷにボクシング</h2>

<div>Player1</div>
<div class="health"><div id="hp1" class="bar"></div></div>

<div>Player2</div>
<div class="health"><div id="hp2" class="bar"></div></div>

<canvas id="game" width="900" height="420"></canvas>

<div id="result"></div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const gravity=0.6

function createPlayer(x,color){
return{
x:x,
y:0,
vx:0,
vy:0,
hp:100,
attack:"",
combo:0,
color:color,
dead:false,
rot:0
}
}

const p1=createPlayer(200,"red")
const p2=createPlayer(700,"deepskyblue")

const hp1=document.getElementById("hp1")
const hp2=document.getElementById("hp2")
const result=document.getElementById("result")

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function physics(p){

p.x+=p.vx
p.y+=p.vy

p.vy-=gravity

p.vx*=0.9

if(p.y<0){
p.y=0
p.vy=0
}

}

function drawPlayer(p){

let baseY=350-p.y

ctx.save()

ctx.translate(p.x,baseY)
ctx.rotate(p.rot)

let squash=1+Math.sin(Date.now()/120)/20

// body
ctx.beginPath()
ctx.ellipse(0,0,28*squash,35,0,0,Math.PI*2)
ctx.fillStyle=p.color
ctx.fill()

// eyes
ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(-8,-5,5,0,Math.PI*2)
ctx.arc(8,-5,5,0,Math.PI*2)
ctx.fill()

// arms
ctx.strokeStyle="white"
ctx.lineWidth=6

let reach=20

if(p.attack==="straight") reach=45
if(p.attack==="hook") reach=40
if(p.attack==="upper") reach=30

ctx.beginPath()
ctx.moveTo(-20,-5)
ctx.lineTo(-20-reach,-5)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(20,-5)
ctx.lineTo(20+reach,-5)
ctx.stroke()

ctx.restore()

}

function attack(attacker,target,type){

if(attacker.dead) return

attacker.attack=type

let dist=Math.abs(attacker.x-target.x)

if(dist<90){

attacker.combo++

let damage=8

if(type==="hook") damage=12
if(type==="upper") damage=15

damage+=attacker.combo*2

target.hp-=damage

// ノックバック
target.vx=(target.x>attacker.x?1:-1)*(6+attacker.combo*2)
target.vy=4

}else{
attacker.combo=0
}

setTimeout(()=>{
attacker.attack=""
},200)

}

function control(){

// player1
if(keys["a"]) p1.x-=4
if(keys["d"]) p1.x+=4
if(keys["w"] && p1.y===0) p1.vy=11

if(keys["f"]) attack(p1,p2,"straight")
if(keys["g"]) attack(p1,p2,"hook")
if(keys["h"]) attack(p1,p2,"upper")

// player2
if(keys["ArrowLeft"]) p2.x-=4
if(keys["ArrowRight"]) p2.x+=4
if(keys["ArrowUp"] && p2.y===0) p2.vy=11

if(keys["j"]) attack(p2,p1,"straight")
if(keys["k"]) attack(p2,p1,"hook")
if(keys["l"]) attack(p2,p1,"upper")

}

function koCheck(){

if(p1.hp<=0 && !p1.dead){
p1.dead=true
fall(p1)
result.textContent="Player2 KO!"
}

if(p2.hp<=0 && !p2.dead){
p2.dead=true
fall(p2)
result.textContent="Player1 KO!"
}

}

function fall(p){

let t=setInterval(()=>{

p.rot+=0.2
p.y-=2

if(p.y<-60){
clearInterval(t)
}

},16)

}

function update(){

control()

physics(p1)
physics(p2)

ctx.clearRect(0,0,900,420)

drawPlayer(p1)
drawPlayer(p2)

hp1.style.width=p1.hp+"%"
hp2.style.width=p2.hp+"%"

koCheck()

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
