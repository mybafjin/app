<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>連打陸上バトル</title>
<style>
body{
font-family:sans-serif;
background:linear-gradient(#87ceeb,#e6f7ff);
text-align:center;
margin:0;
}

h1{
margin:10px;
}

#game{
width:900px;
height:220px;
margin:auto;
background:#4CAF50;
border:5px solid #333;
position:relative;
overflow:hidden;
}

.track{
position:absolute;
width:100%;
height:50%;
border-top:2px dashed white;
}

#runner1,#runner2{
position:absolute;
font-size:50px;
transition:transform 0.05s;
}

#runner1{
top:40px;
left:0;
}

#runner2{
top:130px;
left:0;
}

#finish{
position:absolute;
right:0;
top:0;
height:100%;
width:10px;
background:red;
}

#ui{
margin-top:10px;
}

.bar{
width:300px;
height:15px;
background:#ddd;
margin:auto;
margin-bottom:5px;
}

.fill{
height:100%;
background:#ff5555;
width:100%;
}

button{
padding:10px 20px;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

#controls{
position:absolute;
right:10px;
top:10px;
background:rgba(255,255,255,0.9);
padding:10px;
border-radius:10px;
font-size:14px;
text-align:left;
}
</style>
</head>
<body>

<h1>連打陸上バトル</h1>

<div id="game">

<div class="track"></div>

<div id="runner1">🏃</div>
<div id="runner2">🏃</div>

<div id="finish"></div>

<div id="controls">
<b>操作方法</b><br>
左プレイヤー：Aキー連打<br>
右プレイヤー：Lキー連打
</div>

</div>

<div id="ui">

<p>プレイヤー1スタミナ</p>
<div class="bar"><div id="stam1" class="fill"></div></div>

<p>プレイヤー2スタミナ</p>
<div class="bar"><div id="stam2" class="fill"></div></div>

<h2 id="result"></h2>

<button onclick="restart()">もう一度レース</button>

</div>

<script>

let pos1=0
let pos2=0

let speed1=0
let speed2=0

let stamina1=100
let stamina2=100

let finished=false

const finish=820

document.addEventListener("keydown",e=>{

if(finished)return

if(e.key==="a"){
speed1+=0.6
stamina1-=0.7
}

if(e.key==="l"){
speed2+=0.6
stamina2-=0.7
}

})

function update(){

if(finished)return

speed1*=0.92
speed2*=0.92

if(stamina1<0)stamina1=0
if(stamina2<0)stamina2=0

pos1+=speed1*(stamina1/100)
pos2+=speed2*(stamina2/100)

document.getElementById("runner1").style.left=pos1+"px"
document.getElementById("runner2").style.left=pos2+"px"

document.getElementById("runner1").style.transform=
"rotate("+Math.sin(Date.now()/80)*10+"deg)"

document.getElementById("runner2").style.transform=
"rotate("+Math.sin(Date.now()/80)*10+"deg)"

document.getElementById("stam1").style.width=stamina1+"%"
document.getElementById("stam2").style.width=stamina2+"%"

if(pos1>=finish){
finished=true
document.getElementById("result").innerText="プレイヤー1 勝利！"
}

if(pos2>=finish){
finished=true
document.getElementById("result").innerText="プレイヤー2 勝利！"
}

}

setInterval(update,30)

function restart(){

pos1=0
pos2=0

speed1=0
speed2=0

stamina1=100
stamina2=100

finished=false

document.getElementById("runner1").style.left="0px"
document.getElementById("runner2").style.left="0px"

document.getElementById("result").innerText=""

}

</script>

</body>
</html>
