<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ほふく前進レース</title>

<style>

body{
font-family:sans-serif;
background:linear-gradient(#87ceeb,#e8f8ff);
text-align:center;
margin:0;
}

h1{margin:10px}

#game{
width:900px;
height:220px;
margin:auto;
background:#5dbb63;
border:5px solid #333;
position:relative;
overflow:hidden;
}

.runner{
position:absolute;
width:60px;
height:40px;
}

#p1{bottom:40px}
#p2{bottom:110px}

.head{
width:14px;
height:14px;
background:#ffd7b5;
border-radius:50%;
position:absolute;
top:10px;
left:45px;
}

.body{
width:30px;
height:14px;
background:#2c3e50;
position:absolute;
top:14px;
left:15px;
border-radius:4px;
}

.arm,.leg{
width:18px;
height:6px;
background:#ffd7b5;
position:absolute;
transform-origin:left center;
border-radius:3px;
}

.arm{top:12px}
.leg{top:22px}

.arm1{left:5px}
.arm2{left:5px}

.leg1{left:20px}
.leg2{left:20px}

#finish{
position:absolute;
right:80px;
width:10px;
height:100%;
background:red;
}

#count{
position:absolute;
top:40%;
width:100%;
font-size:70px;
font-weight:bold;
color:white;
text-shadow:3px 3px 6px black;
}

#controls{
margin-top:10px;
font-size:18px;
}

button{
margin-top:10px;
padding:10px 20px;
font-size:18px;
}

</style>
</head>
<body>

<h1>ほふく前進レース</h1>

<div id="game">

<div id="p1" class="runner">
<div class="head"></div>
<div class="body"></div>
<div class="arm arm1"></div>
<div class="arm arm2"></div>
<div class="leg leg1"></div>
<div class="leg leg2"></div>
</div>

<div id="p2" class="runner">
<div class="head"></div>
<div class="body"></div>
<div class="arm arm1"></div>
<div class="arm arm2"></div>
<div class="leg leg1"></div>
<div class="leg leg2"></div>
</div>

<div id="finish"></div>

<div id="count"></div>

</div>

<div id="controls">
プレイヤー1：Aキー連打　
プレイヤー2：Lキー連打
</div>

<h2 id="result"></h2>

<button onclick="restart()">もう一度</button>

<script>

let pos1=0
let pos2=0

let started=false
let finished=false

const finish=800

function countdown(){

let count=3
const el=document.getElementById("count")

const timer=setInterval(()=>{

if(count>0){
el.innerText=count
count--
}else if(count===0){
el.innerText="START!"
started=true
count--
}else{
el.innerText=""
clearInterval(timer)
}

},1000)

}

countdown()

document.addEventListener("keydown",function(e){

if(!started || finished) return

if(e.key.toLowerCase()=="a"){
pos1+=8
}

if(e.key.toLowerCase()=="l"){
pos2+=8
}

})

function animate(id){

let r=document.getElementById(id)
let arms=r.getElementsByClassName("arm")
let legs=r.getElementsByClassName("leg")

let phase=Math.sin(Date.now()/80)*30

arms[0].style.transform="rotate("+phase+"deg)"
arms[1].style.transform="rotate("+(-phase)+"deg)"

legs[0].style.transform="rotate("+(-phase)+"deg)"
legs[1].style.transform="rotate("+phase+"deg)"

}

function update(){

document.getElementById("p1").style.left=pos1+"px"
document.getElementById("p2").style.left=pos2+"px"

animate("p1")
animate("p2")

if(pos1>finish && !finished){
finished=true
document.getElementById("result").innerText="プレイヤー1 ゴール！"
}

if(pos2>finish && !finished){
finished=true
document.getElementById("result").innerText="プレイヤー2 ゴール！"
}

requestAnimationFrame(update)

}

update()

function restart(){

pos1=0
pos2=0
started=false
finished=false

document.getElementById("result").innerText=""
document.getElementById("p1").style.left="0px"
document.getElementById("p2").style.left="0px"

countdown()

}

</script>

</body>
</html>
