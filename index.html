<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Runner Game</title>

<style>
body{
    margin:0;
    background:#87CEEB;
    overflow:hidden;
    font-family:sans-serif;
}

#game{
    width:400px;
    height:600px;
    margin:auto;
    background:#6ec1ff;
    position:relative;
    overflow:hidden;
    border:4px solid white;
}

#road{
    position:absolute;
    width:100%;
    height:200%;
    background:repeating-linear-gradient(
        #555 0px,
        #555 60px,
        #777 60px,
        #777 120px
    );
}

#player{
    width:50px;
    height:60px;
    background:yellow;
    border-radius:15px;
    position:absolute;
    bottom:80px;
    left:175px;
    border:3px solid black;
}

.coin{
    width:25px;
    height:25px;
    background:gold;
    border-radius:50%;
    position:absolute;
    top:-30px;
}

.obstacle{
    width:50px;
    height:50px;
    background:red;
    position:absolute;
    top:-60px;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:20px;
}
</style>
</head>

<body>

<div id="game">

<div id="road"></div>
<div id="player"></div>
<div id="score">Score:0</div>

</div>

<script>

const player = document.getElementById("player");
const game = document.getElementById("game");
const road = document.getElementById("road");
const scoreText = document.getElementById("score");

let score = 0;
let speed = 4;
let keys = {};
let roadY = 0;

document.addEventListener("keydown",e=>{
    keys[e.key]=true;
});

document.addEventListener("keyup",e=>{
    keys[e.key]=false;
});

game.addEventListener("click",()=>{
    if(player.offsetLeft < 200){
        player.style.left="300px";
    }else{
        player.style.left="50px";
    }
});

function createCoin(){

    const coin=document.createElement("div");
    coin.classList.add("coin");

    coin.style.left=Math.floor(Math.random()*360)+"px";

    game.appendChild(coin);
    return coin;
}

function createObstacle(){

    const obs=document.createElement("div");
    obs.classList.add("obstacle");

    obs.style.left=Math.floor(Math.random()*350)+"px";

    game.appendChild(obs);
    return obs;
}

let coins=[];
let obstacles=[];

setInterval(()=>{
    coins.push(createCoin());
},1200);

setInterval(()=>{
    obstacles.push(createObstacle());
},2000);

function gameLoop(){

    if(keys["ArrowLeft"]){
        player.style.left=
        Math.max(0,player.offsetLeft-6)+"px";
    }

    if(keys["ArrowRight"]){
        player.style.left=
        Math.min(350,player.offsetLeft+6)+"px";
    }

    roadY+=speed;
    road.style.top=-(roadY%120)+"px";

    coins.forEach((coin,i)=>{

        coin.style.top=coin.offsetTop+speed+"px";

        if(checkCollision(player,coin)){
            score+=10;
            coin.remove();
            coins.splice(i,1);
        }

        if(coin.offsetTop>600){
            coin.remove();
            coins.splice(i,1);
        }

    });

    obstacles.forEach((obs,i)=>{

        obs.style.top=obs.offsetTop+speed+"px";

        if(checkCollision(player,obs)){
            alert("Game Over! Score:"+score);
            location.reload();
        }

        if(obs.offsetTop>600){
            obs.remove();
            obstacles.splice(i,1);
        }

    });

    scoreText.textContent="Score:"+score;

    requestAnimationFrame(gameLoop);
}

function checkCollision(a,b){

    return !(
        a.offsetTop + a.offsetHeight < b.offsetTop ||
        a.offsetTop > b.offsetTop + b.offsetHeight ||
        a.offsetLeft + a.offsetWidth < b.offsetLeft ||
        a.offsetLeft > b.offsetLeft + b.offsetWidth
    );

}

gameLoop();

</script>

</body>
</html>
