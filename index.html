<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ぷにぷにボクシング</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
overflow:hidden;
}

#container{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

canvas{
background:linear-gradient(#666,#222);
border:4px solid white;
}

.panel{
width:200px;
padding:20px;
font-size:14px;
line-height:1.6;
}

.left{color:#ff9ac6}
.right{color:#8cff8c}

.health{
position:absolute;
top:10px;
width:300px;
height:18px;
background:#333;
border:2px solid white;
}

#hp1{left:220px}
#hp2{right:220px}

.bar{
height:100%;
background:lime;
}

#result{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:50px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="result"></div>

<div class="health" id="hp1"><div class="bar" id="bar1"></div></div>
<div class="health" id="hp2"><div class="bar" id="bar2"></div></div>

<div id="container">

<div class="panel left">
<h3>🦍 ピンクゴリラ</h3>
A / D 移動<br>
W ジャンプ<br>
F ストレート<br>
G フック<br>
H アッパー
</div>

<canvas id="game" width="900" height="420"></canvas>

<div class="panel right">
<h3>🐼 黄緑パンダ</h3>
← → 移動<br>
↑ ジャンプ<br>
J ストレート<br>
K フック<br>
L アッパー
</div>

</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const gravity=0.6

function player(x,color,type){
return{
x:x,
y:0,
vx:0,
vy:0,
hp:100,
attack:"",
combo:0,
rot:0,
dead:false,
color:color,
type:type
}
}

const gorilla=player(200,"#ff8fb6","gorilla")
const panda=player(700,"#9cff7a","panda")

const bar1=document.getElementById("bar1")
const bar2=document.getElementById("bar2")
const result=document.getElementById("result")

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function physics(p){

p.x+=p.vx
p.y+=p.vy

p.vy-=gravity
p.vx*=0.9

if(p.y<0){
p.y=0
p.vy=0
}

}

function drawFace(p){

if(p.type==="gorilla"){

ctx.fillStyle="#222"
ctx.beginPath()
ctx.arc(-8,-6,4,0,Math.PI*2)
ctx.arc(8,-6,4,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(0,4,8,0,Math.PI*2)
ctx.fillStyle="#ffd1dc"
ctx.fill()

}

if(p.type==="panda"){

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(-10,-6,6,0,Math.PI*2)
ctx.arc(10,-6,6,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(-10,-6,3,0,Math.PI*2)
ctx.arc(10,-6,3,0,Math.PI*2)
ctx.fill()

}

}

function drawPlayer(p){

let baseY=350-p.y

ctx.save()

ctx.translate(p.x,baseY)
ctx.rotate(p.rot)

let squash=1+Math.sin(Date.now()/150)/18

// body
ctx.beginPath()
ctx.ellipse(0,0,30*squash,38,0,0,Math.PI*2)
ctx.fillStyle=p.color
ctx.fill()

// arms
ctx.strokeStyle="white"
ctx.lineWidth=7

let reach=20

if(p.attack==="straight") reach=45
if(p.attack==="hook") reach=38
if(p.attack==="upper") reach=30

ctx.beginPath()
ctx.moveTo(-25,-5)
ctx.lineTo(-25-reach,-5)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(25,-5)
ctx.lineTo(25+reach,-5)
ctx.stroke()

drawFace(p)

ctx.restore()

}

function attack(a,t,type){

if(a.dead) return

a.attack=type

let dist=Math.abs(a.x-t.x)

if(dist<90){

a.combo++

let dmg=8
if(type==="hook") dmg=12
if(type==="upper") dmg=16

dmg+=a.combo*2

t.hp-=dmg

t.vx=(t.x>a.x?1:-1)*(6+a.combo*2)
t.vy=4

}else{
a.combo=0
}

setTimeout(()=>a.attack="",200)

}

function control(){

if(keys["a"]) gorilla.x-=4
if(keys["d"]) gorilla.x+=4
if(keys["w"] && gorilla.y===0) gorilla.vy=11

if(keys["f"]) attack(gorilla,panda,"straight")
if(keys["g"]) attack(gorilla,panda,"hook")
if(keys["h"]) attack(gorilla,panda,"upper")

if(keys["ArrowLeft"]) panda.x-=4
if(keys["ArrowRight"]) panda.x+=4
if(keys["ArrowUp"] && panda.y===0) panda.vy=11

if(keys["j"]) attack(panda,gorilla,"straight")
if(keys["k"]) attack(panda,gorilla,"hook")
if(keys["l"]) attack(panda,gorilla,"upper")

}

function koCheck(){

if(gorilla.hp<=0 && !gorilla.dead){
gorilla.dead=true
result.textContent="🐼 パンダ KO!"
fall(gorilla)
}

if(panda.hp<=0 && !panda.dead){
panda.dead=true
result.textContent="🦍 ゴリラ KO!"
fall(panda)
}

}

function fall(p){

let t=setInterval(()=>{

p.rot+=0.2
p.y-=2

if(p.y<-80) clearInterval(t)

},16)

}

function update(){

control()

physics(gorilla)
physics(panda)

ctx.clearRect(0,0,900,420)

drawPlayer(gorilla)
drawPlayer(panda)

bar1.style.width=gorilla.hp+"%"
bar2.style.width=panda.hp+"%"

koCheck()

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
