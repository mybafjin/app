<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ほふく前進レース</title>

<style>

body{
font-family:sans-serif;
background:linear-gradient(#87ceeb,#e8f8ff);
text-align:center;
margin:0;
}

h1{margin:10px}

#game{
width:900px;
height:220px;
margin:auto;
background:#5dbb63;
border:5px solid #333;
position:relative;
overflow:hidden;
}

#ground{
position:absolute;
bottom:0;
height:60px;
width:100%;
background:#7a5230;
}

.runner{
position:absolute;
width:60px;
height:40px;
}

.head{
width:14px;
height:14px;
background:#ffd7b5;
border-radius:50%;
position:absolute;
top:10px;
left:45px;
}

.body{
width:30px;
height:14px;
background:#2c3e50;
position:absolute;
top:14px;
left:15px;
border-radius:4px;
}

.arm,.leg{
width:18px;
height:6px;
background:#ffd7b5;
position:absolute;
transform-origin:left center;
border-radius:3px;
}

.arm{top:12px}
.leg{top:22px}

.arm1{left:5px}
.arm2{left:5px}

.leg1{left:20px}
.leg2{left:20px}

#finish{
position:absolute;
right:0;
width:10px;
height:100%;
background:red;
}

.bar{
width:300px;
height:15px;
background:#ddd;
margin:auto;
margin-bottom:8px;
}

.fill{
height:100%;
background:#ff6666;
width:100%;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#controls{
position:absolute;
right:10px;
top:10px;
background:white;
padding:10px;
border-radius:10px;
font-size:14px;
text-align:left;
}

</style>
</head>
<body>

<h1>ほふく前進レース</h1>

<div id="game">

<div id="p1" class="runner">
<div class="head"></div>
<div class="body"></div>
<div class="arm arm1"></div>
<div class="arm arm2"></div>
<div class="leg leg1"></div>
<div class="leg leg2"></div>
</div>

<div id="p2" class="runner" style="bottom:90px">
<div class="head"></div>
<div class="body"></div>
<div class="arm arm1"></div>
<div class="arm arm2"></div>
<div class="leg leg1"></div>
<div class="leg leg2"></div>
</div>

<div id="finish"></div>
<div id="ground"></div>

<div id="controls">
<b>操作</b><br>
プレイヤー1：Aキー連打<br>
プレイヤー2：Lキー連打
</div>

</div>

<p>プレイヤー1スタミナ</p>
<div class="bar"><div id="stam1" class="fill"></div></div>

<p>プレイヤー2スタミナ</p>
<div class="bar"><div id="stam2" class="fill"></div></div>

<h2 id="result"></h2>

<button onclick="restart()">もう一度</button>

<script>

let pos1=0
let pos2=0

let speed1=0
let speed2=0

let stamina1=100
let stamina2=100

let finished=false

const finish=820

document.addEventListener("keydown",e=>{

if(finished)return

if(e.key==="a"){
speed1+=0.7
stamina1-=0.5
}

if(e.key==="l"){
speed2+=0.7
stamina2-=0.5
}

})

function animateRunner(id,phase){

let r=document.getElementById(id)

let arms=r.getElementsByClassName("arm")
let legs=r.getElementsByClassName("leg")

arms[0].style.transform="rotate("+phase+"deg)"
arms[1].style.transform="rotate("+(-phase)+"deg)"

legs[0].style.transform="rotate("+(-phase)+"deg)"
legs[1].style.transform="rotate("+phase+"deg")

}

function update(){

if(finished)return

speed1*=0.9
speed2*=0.9

pos1+=speed1*(stamina1/100)
pos2+=speed2*(stamina2/100)

if(stamina1<0)stamina1=0
if(stamina2<0)stamina2=0

document.getElementById("p1").style.left=pos1+"px"
document.getElementById("p2").style.left=pos2+"px"

let phase=Math.sin(Date.now()/80)*30

animateRunner("p1",phase)
animateRunner("p2",phase)

document.getElementById("stam1").style.width=stamina1+"%"
document.getElementById("stam2").style.width=stamina2+"%"

if(pos1>=finish){
finished=true
document.getElementById("result").innerText="プレイヤー1 勝利！"
}

if(pos2>=finish){
finished=true
document.getElementById("result").innerText="プレイヤー2 勝利！"
}

}

setInterval(update,30)

function restart(){

pos1=0
pos2=0
speed1=0
speed2=0

stamina1=100
stamina2=100

finished=false

document.getElementById("p1").style.left="0px"
document.getElementById("p2").style.left="0px"

document.getElementById("result").innerText=""

}

</script>

</body>
</html>
