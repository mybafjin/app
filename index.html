<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Banana Runner</title>

<style>
body{
    margin:0;
    background:#87CEEB;
    overflow:hidden;
    font-family:sans-serif;
}

#game{
    width:420px;
    height:650px;
    margin:auto;
    background:#6ec1ff;
    position:relative;
    overflow:hidden;
    border:5px solid white;
}

#road{
    position:absolute;
    width:100%;
    height:200%;
    background:repeating-linear-gradient(
        #555 0px,
        #555 80px,
        #777 80px,
        #777 160px
    );
}

#player{
    width:50px;
    height:70px;
    background:yellow;
    border-radius:20px;
    border:3px solid black;
    position:absolute;
    bottom:80px;
    left:185px;
    transition:left 0.2s;
}

.jump{
    animation:jump 0.6s;
}

@keyframes jump{
    0%{bottom:80px}
    50%{bottom:200px}
    100%{bottom:80px}
}

.slide{
    height:35px;
}

.banana{
    width:30px;
    height:20px;
    background:gold;
    border-radius:20px;
    position:absolute;
    top:-40px;
}

.obstacle{
    width:50px;
    height:60px;
    background:red;
    position:absolute;
    top:-80px;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:20px;
}
</style>
</head>

<body>

<div id="game">
<div id="road"></div>
<div id="player"></div>
<div id="score">Bananas:0</div>
</div>

<script>

const game = document.getElementById("game");
const player = document.getElementById("player");
const road = document.getElementById("road");
const scoreText = document.getElementById("score");

const lanes=[60,185,310];
let lane=1;

let bananas=[];
let obstacles=[];

let score=0;
let speed=4;
let roadY=0;

let jumping=false;
let sliding=false;

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft" && lane>0){
lane--;
player.style.left=lanes[lane]+"px";
}

if(e.key==="ArrowRight" && lane<2){
lane++;
player.style.left=lanes[lane]+"px";
}

if(e.key==="ArrowUp" && !jumping){
jump();
}

if(e.key==="ArrowDown" && !sliding){
slide();
}

});

function jump(){
jumping=true;
player.classList.add("jump");

setTimeout(()=>{
player.classList.remove("jump");
jumping=false;
},600);
}

function slide(){
sliding=true;
player.classList.add("slide");

setTimeout(()=>{
player.classList.remove("slide");
sliding=false;
},600);
}

function createBanana(){

const banana=document.createElement("div");
banana.classList.add("banana");

let laneIndex=Math.floor(Math.random()*3);
banana.dataset.lane=laneIndex;

banana.style.left=lanes[laneIndex]+"px";

game.appendChild(banana);
bananas.push(banana);
}

function createObstacle(){

const obs=document.createElement("div");
obs.classList.add("obstacle");

let laneIndex=Math.floor(Math.random()*3);
obs.dataset.lane=laneIndex;

obs.style.left=lanes[laneIndex]+"px";

game.appendChild(obs);
obstacles.push(obs);
}

setInterval(createBanana,1200);
setInterval(createObstacle,2000);

function gameLoop(){

roadY+=speed;
road.style.top=-(roadY%160)+"px";

speed+=0.0005;

bananas.forEach((banana,i)=>{

banana.style.top=banana.offsetTop+speed+"px";

if(checkCollision(player,banana)){
score+=1;
banana.remove();
bananas.splice(i,1);
}

if(banana.offsetTop>650){
banana.remove();
bananas.splice(i,1);
}

});

obstacles.forEach((obs,i)=>{

obs.style.top=obs.offsetTop+speed+"px";

if(checkCollision(player,obs)){
alert("Game Over! Bananas:"+score);
location.reload();
}

if(obs.offsetTop>650){
obs.remove();
obstacles.splice(i,1);
}

});

scoreText.textContent="Bananas:"+score;

requestAnimationFrame(gameLoop);
}

function checkCollision(a,b){

return !(
a.offsetTop + a.offsetHeight < b.offsetTop ||
a.offsetTop > b.offsetTop + b.offsetHeight ||
a.offsetLeft + a.offsetWidth < b.offsetLeft ||
a.offsetLeft > b.offsetLeft + b.offsetWidth
);

}

gameLoop();

</script>

</body>
</html>
