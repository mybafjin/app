<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゴリラ vs パンダ</title>

<style>

body{
margin:0;
background:#87ceeb;
font-family:sans-serif;
overflow:hidden;
}

canvas{
display:block;
margin:auto;
background:linear-gradient(#87ceeb 70%, #4caf50 70%);
border:4px solid black;
}

.health{
position:absolute;
top:10px;
width:300px;
height:20px;
background:#333;
border:2px solid black;
}

#hp1{left:220px}
#hp2{right:220px}

.bar{
height:100%;
background:red;
}

.panel{
position:absolute;
top:80px;
width:200px;
font-size:14px;
}

.left{left:10px}
.right{right:10px}

#result{
position:absolute;
top:35%;
width:100%;
text-align:center;
font-size:50px;
font-weight:bold;
}

#restart{
position:absolute;
top:50%;
left:50%;
transform:translateX(-50%);
padding:10px 20px;
font-size:20px;
display:none;
}

</style>
</head>

<body>

<div id="result"></div>
<button id="restart">もう一度試合</button>

<div class="health" id="hp1"><div class="bar" id="bar1"></div></div>
<div class="health" id="hp2"><div class="bar" id="bar2"></div></div>

<div class="panel left">
<b>🦍 ゴリラ</b><br>
A/D 移動<br>
W ジャンプ<br>
F ストレート<br>
G フック<br>
H アッパー
</div>

<div class="panel right">
<b>🐼 パンダ</b><br>
← → 移動<br>
↑ ジャンプ<br>
J ストレート<br>
K フック<br>
L アッパー
</div>

<canvas id="game" width="900" height="420"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const gravity=0.6

function player(x,type){
return{
x:x,
y:0,
vx:0,
vy:0,
hp:100,
attack:"",
combo:0,
dead:false,
arm:0,
type:type
}
}

let gorilla,panda
let effects=[]

function reset(){

gorilla=player(200,"gorilla")
panda=player(700,"panda")

document.getElementById("result").textContent=""
document.getElementById("restart").style.display="none"

}

reset()

document.getElementById("restart").onclick=reset

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function physics(p){

p.x+=p.vx
p.y+=p.vy

p.vy-=gravity
p.vx*=0.9

if(p.y<0){
p.y=0
p.vy=0
}

}

function drawPlayer(p){

let baseY=350-p.y

ctx.save()
ctx.translate(p.x,baseY)

let armMove=0
if(p.attack==="straight") armMove=40
if(p.attack==="hook") armMove=30
if(p.attack==="upper") armMove=20

// body
ctx.fillStyle=(p.type==="gorilla")?"#333":"white"
ctx.beginPath()
ctx.ellipse(0,0,40,55,0,0,Math.PI*2)
ctx.fill()

// arms
ctx.fillStyle=(p.type==="gorilla")?"#222":"black"
ctx.beginPath()
ctx.ellipse(-45-armMove,-10,20,35,0,0,Math.PI*2)
ctx.ellipse(45+armMove,-10,20,35,0,0,Math.PI*2)
ctx.fill()

// legs
ctx.beginPath()
ctx.ellipse(-20,45,20,25,0,0,Math.PI*2)
ctx.ellipse(20,45,20,25,0,0,Math.PI*2)
ctx.fill()

// head
ctx.fillStyle=(p.type==="gorilla")?"#444":"white"
ctx.beginPath()
ctx.arc(0,-60,25,0,Math.PI*2)
ctx.fill()

if(p.type==="panda"){

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(-18,-80,8,0,Math.PI*2)
ctx.arc(18,-80,8,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(-10,-60,7,0,Math.PI*2)
ctx.arc(10,-60,7,0,Math.PI*2)
ctx.fill()

}

ctx.restore()

}

function drawEffects(){

for(let i=effects.length-1;i>=0;i--){

let e=effects[i]

ctx.fillStyle="yellow"

ctx.beginPath()
ctx.arc(e.x,e.y,e.r,0,Math.PI*2)
ctx.fill()

e.r+=1
e.life--

if(e.life<=0) effects.splice(i,1)

}

}

function attack(a,t,type){

if(a.dead) return

a.attack=type

let dist=Math.abs(a.x-t.x)

if(dist<100){

a.combo++

let dmg=2
if(type==="hook") dmg=3
if(type==="upper") dmg=4

dmg+=Math.floor(a.combo/3)

t.hp-=dmg

effects.push({
x:(a.x+t.x)/2,
y:300,
r:5,
life:10
})

t.vx=(t.x>a.x?1:-1)*(6+a.combo)
t.vy=4

}else{
a.combo=0
}

setTimeout(()=>a.attack="",200)

}

function control(){

if(keys["a"]) gorilla.x-=4
if(keys["d"]) gorilla.x+=4
if(keys["w"] && gorilla.y===0) gorilla.vy=11

if(keys["f"]) attack(gorilla,panda,"straight")
if(keys["g"]) attack(gorilla,panda,"hook")
if(keys["h"]) attack(gorilla,panda,"upper")

if(keys["ArrowLeft"]) panda.x-=4
if(keys["ArrowRight"]) panda.x+=4
if(keys["ArrowUp"] && panda.y===0) panda.vy=11

if(keys["j"]) attack(panda,gorilla,"straight")
if(keys["k"]) attack(panda,gorilla,"hook")
if(keys["l"]) attack(panda,gorilla,"upper")

}

function koCheck(){

if(gorilla.hp<=0 && !gorilla.dead){
gorilla.dead=true
document.getElementById("result").textContent="🐼 パンダ KO!"
document.getElementById("restart").style.display="block"
}

if(panda.hp<=0 && !panda.dead){
panda.dead=true
document.getElementById("result").textContent="🦍 ゴリラ KO!"
document.getElementById("restart").style.display="block"
}

}

function update(){

control()

physics(gorilla)
physics(panda)

ctx.clearRect(0,0,900,420)

drawPlayer(gorilla)
drawPlayer(panda)

drawEffects()

document.getElementById("bar1").style.width=gorilla.hp+"%"
document.getElementById("bar2").style.width=panda.hp+"%"

koCheck()

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
