<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ボクシング対戦ゲーム</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

h1{
margin:10px;
}

#game{
position:relative;
width:900px;
height:420px;
margin:auto;
background:linear-gradient(#555,#222);
border:4px solid white;
overflow:hidden;
}

.fighter{
position:absolute;
bottom:0;
width:80px;
height:140px;
}

.health{
width:400px;
height:20px;
background:#333;
margin:auto;
border:2px solid white;
}

.bar{
height:100%;
background:lime;
}

#result{
font-size:30px;
margin-top:10px;
}

canvas{
position:absolute;
left:0;
top:0;
}

</style>
</head>

<body>

<h1>🥊 ボクシングゲーム</h1>

<div>赤（朝倉未来風）</div>
<div class="health"><div id="hp1" class="bar"></div></div>

<div>青（デヴィ夫人風）</div>
<div class="health"><div id="hp2" class="bar"></div></div>

<div id="game">
<canvas id="canvas" width="900" height="420"></canvas>
</div>

<div id="result"></div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const gravity = 0.7

const p1={
x:200,
y:0,
vy:0,
hp:100,
combo:0,
attack:false,
color:"red",
face:"未来風"
}

const p2={
x:650,
y:0,
vy:0,
hp:100,
combo:0,
attack:false,
color:"blue",
face:"夫人風"
}

const hp1=document.getElementById("hp1")
const hp2=document.getElementById("hp2")
const result=document.getElementById("result")

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function drawFighter(p){

let baseY = 350 - p.y

ctx.strokeStyle="white"
ctx.lineWidth=4

// body
ctx.beginPath()
ctx.moveTo(p.x,baseY)
ctx.lineTo(p.x,baseY-60)
ctx.stroke()

// legs
ctx.beginPath()
ctx.moveTo(p.x,baseY)
ctx.lineTo(p.x-15,baseY+30)
ctx.moveTo(p.x,baseY)
ctx.lineTo(p.x+15,baseY+30)
ctx.stroke()

// arms
ctx.beginPath()

if(p.attack){
ctx.moveTo(p.x,baseY-40)
ctx.lineTo(p.x+40,baseY-40)
}else{
ctx.moveTo(p.x,baseY-40)
ctx.lineTo(p.x+20,baseY-20)
}

ctx.moveTo(p.x,baseY-40)
ctx.lineTo(p.x-20,baseY-20)
ctx.stroke()

// head
ctx.beginPath()
ctx.arc(p.x,baseY-80,18,0,Math.PI*2)
ctx.fillStyle=p.color
ctx.fill()

ctx.fillStyle="white"
ctx.font="10px sans-serif"
ctx.fillText(p.face,p.x-18,baseY-80)

}

function physics(p){

p.y+=p.vy
p.vy-=gravity

if(p.y<0){
p.y=0
p.vy=0
}

}

function punch(attacker,target){

if(attacker.attack) return

attacker.attack=true

let dist=Math.abs(attacker.x-target.x)

if(dist<80){

attacker.combo++

let damage=8+attacker.combo*2

target.hp-=damage

}else{
attacker.combo=0
}

setTimeout(()=>{
attacker.attack=false
},200)

}

function control(){

// player1
if(keys["a"]) p1.x-=5
if(keys["d"]) p1.x+=5
if(keys["w"] && p1.y===0) p1.vy=12
if(keys["f"]) punch(p1,p2)

// player2
if(keys["ArrowLeft"]) p2.x-=5
if(keys["ArrowRight"]) p2.x+=5
if(keys["ArrowUp"] && p2.y===0) p2.vy=12
if(keys["/"]) punch(p2,p1)

}

function update(){

control()

physics(p1)
physics(p2)

ctx.clearRect(0,0,900,420)

drawFighter(p1)
drawFighter(p2)

hp1.style.width=p1.hp+"%"
hp2.style.width=p2.hp+"%"

if(p1.hp<=0){
result.textContent="青（夫人風）の勝ち！"
return
}

if(p2.hp<=0){
result.textContent="赤（未来風）の勝ち！"
return
}

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
