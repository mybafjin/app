<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ほふく前進レース</title>

<style>

body{
font-family:sans-serif;
background:linear-gradient(#87ceeb,#e8f8ff);
text-align:center;
margin:0;
}

h1{
margin:10px;
}

#game{
width:900px;
height:200px;
margin:auto;
background:#5dbb63;
border:5px solid #333;
position:relative;
overflow:hidden;
}

#ground{
position:absolute;
bottom:0;
height:50px;
width:100%;
background:#7a5230;
}

.runner{
position:absolute;
font-size:45px;
}

#p1{
left:0;
bottom:40px;
}

#p2{
left:0;
bottom:90px;
}

#finish{
position:absolute;
right:0;
height:100%;
width:10px;
background:red;
}

.bar{
width:300px;
height:15px;
background:#ddd;
margin:auto;
margin-bottom:8px;
}

.fill{
height:100%;
background:#ff6666;
width:100%;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#controls{
position:absolute;
right:10px;
top:10px;
background:white;
padding:10px;
border-radius:10px;
font-size:14px;
text-align:left;
}

</style>
</head>
<body>

<h1>ほふく前進レース</h1>

<div id="game">

<div id="p1" class="runner">🪖</div>
<div id="p2" class="runner">🪖</div>

<div id="finish"></div>

<div id="ground"></div>

<div id="controls">
<b>操作</b><br>
プレイヤー1：Aキー連打<br>
プレイヤー2：Lキー連打
</div>

</div>

<p>プレイヤー1スタミナ</p>
<div class="bar"><div id="stam1" class="fill"></div></div>

<p>プレイヤー2スタミナ</p>
<div class="bar"><div id="stam2" class="fill"></div></div>

<h2 id="result"></h2>

<button onclick="restart()">もう一度</button>

<script>

let pos1=0
let pos2=0

let speed1=0
let speed2=0

let stamina1=100
let stamina2=100

let finished=false

const finish=820

document.addEventListener("keydown",e=>{

if(finished)return

if(e.key==="a"){
speed1+=0.7
stamina1-=0.5
}

if(e.key==="l"){
speed2+=0.7
stamina2-=0.5
}

})

function update(){

if(finished)return

speed1*=0.9
speed2*=0.9

pos1+=speed1*(stamina1/100)
pos2+=speed2*(stamina2/100)

if(stamina1<0)stamina1=0
if(stamina2<0)stamina2=0

document.getElementById("p1").style.left=pos1+"px"
document.getElementById("p2").style.left=pos2+"px"

let wiggle=Math.sin(Date.now()/70)*15

document.getElementById("p1").style.transform=
"rotate("+wiggle+"deg)"

document.getElementById("p2").style.transform=
"rotate("+wiggle+"deg)"

document.getElementById("stam1").style.width=stamina1+"%"
document.getElementById("stam2").style.width=stamina2+"%"

if(pos1>=finish){
finished=true
document.getElementById("result").innerText="プレイヤー1 勝利！"
}

if(pos2>=finish){
finished=true
document.getElementById("result").innerText="プレイヤー2 勝利！"
}

}

setInterval(update,30)

function restart(){

pos1=0
pos2=0
speed1=0
speed2=0

stamina1=100
stamina2=100

finished=false

document.getElementById("p1").style.left="0px"
document.getElementById("p2").style.left="0px"

document.getElementById("result").innerText=""

}

</script>

</body>
</html>
